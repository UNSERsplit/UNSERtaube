<div class="status-container" [class.connected]="isConnected" [class.disconnected]="!isConnected" [style.font-size.px]="fontsize" [style.margin.px]="margin" [style.padding.px]="padding">
    <span class="status-dot"></span>
    <span class="status-text">
    {{ isConnected  ? 'Verbunden' : 'Nicht Verbunden' }}
  </span>
</div>
